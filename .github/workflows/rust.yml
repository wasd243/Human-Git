name: Rust

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: windows-latest

    steps:
    # Don't needs to use sudo
    - name: Build
      run: cargo build --verbose
      
    - name: Check
      run: cargo check
